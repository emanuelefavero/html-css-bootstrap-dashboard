<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A responsive dashboard layout using HTML, CSS, and Bootstrap 5."
    />
    <meta name="author" content="Emanuele Favero" />
    <title>HTML/CSS Bootstrap Dashboard</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
  </head>

  <body>
    <!-- HEADER Navbar -->
    <header>
      <nav class="navbar navbar-expand-lg bg-body py-2" data-bs-theme="dark">
        <div class="container-fluid">
          <!-- Logo -->
          <a class="navbar-brand focus-ring focus-ring-light rounded-3" href="#"
            ><img src="assets/img/duck.png" alt="Logo" width="60" height="60"
          /></a>

          <!-- Navbar toggler -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <!-- Navbar links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 text-capitalize">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >Catalogo Libri</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Anagrafica Utenti</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Storico Prestiti</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Help</a>
              </li>
            </ul>

            <!-- Search form -->
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Cerca..."
                aria-label="Cerca"
                data-bs-theme="light"
              />
              <button class="btn btn-outline-light" type="submit">Cerca</button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container py-4 border border-danger">
      <div class="row">
        <!-- LEFT SIDE: Title/Button + Table -->
        <section class="col-12 col-xl-9 border border-secondary">
          <div class="d-flex justify-content-between align-items-center">
            <h1 class="text-capitalize h3">Catalogo Libri</h1>
            <button class="btn btn-primary">Aggiungi Libro</button>
          </div>

          <!-- Table -->
          <!-- ? use .table-responsive so mobile does not break -->
          <!-- table with badges and outline-secondary action buttons -->
          <div class="border border-danger" style="min-height: 600px">
            Table Placeholder - REMOVE THIS DIV!!!
          </div>
        </section>

        <!-- RIGHT SIDE: todo + faq cards -->
        <aside class="col-12 col-xl-3 border border-warning">
          <div class="vstack gap-4">
            <!-- Todo Card with .card-header children -->
            <!-- Inside: list group with checks inside -->
            <div class="border border-danger" style="min-height: 200px">
              TODO List Placeholder - REMOVE THIS DIV!!!
            </div>

            <!-- F.A.Q. Card with .card-header children -->
            <!-- Inside: list group with questions and answers -->
            <div class="border border-danger" style="min-height: 200px">
              FAQ Placeholder - REMOVE THIS DIV!!!
            </div>
          </div>
        </aside>
      </div>
    </main>
  </body>
</html>
