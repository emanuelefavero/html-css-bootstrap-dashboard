<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta

    />
    <meta name="author" content="Emanuele Favero" />
    <title>HTML/CSS Bootstrap Dashboard - Nuovo Libro</title>

    <!-- Favicon SVG -->
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />

    <!-- Bootstrap CSS -->
    <link

      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script

      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"

            ><img src="assets/img/duck.png" alt="Logo" width="60" height="60"

            aria-label="Apri menu"

            <ul class="navbar-nav me-auto mb-2 mb-lg-0 text-capitalize">

                <a

              <li class="nav-item">

              <li class="nav-item">
                <a class="nav-link rounded-3 focus-visible-ring" href="#"
                  >Help</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <section class="vstack gap-3 py-2">
